name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        env:
          # Public function URL of the Ask-Me-Anything gatekeeper (not a secret; ADR-0007/0009).
          PUBLIC_ASK_API_URL: https://robertobautistafregoso-github-io.vercel.app/api/ask
        with:
          node-version: 22  # Node 22 for the Astro 5 build; the action defaults to 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
